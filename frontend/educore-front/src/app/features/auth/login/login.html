<p-toast />
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <span class="login-logo">🎓</span>
      <h1>EduCore</h1>
      <p>Sistema de Gestión Escolar</p>
    </div>

    <div class="login-form">
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input 
          pInputText
          id="email"
          type="email"
          [(ngModel)]="email"
          placeholder="admin@educore.com"
          class="w-full" />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <p-password
          id="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          [feedback]="false"
          [toggleMask]="true"
          class="w-full" />
      </div>

      <p-button
        label="Iniciar sesión"
        icon="pi pi-sign-in"
        class="w-full"
        [loading]="cargando"
        (onClick)="login()" />
    </div>
  </div>
</div>
